<app-menu></app-menu>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <!-- Título -->
      <div class="text-center mb-4">
        <h1 class="h2 fw-bold text-dark">{{ isEditMode ? 'Editar Sala' : 'Nueva Sala' }}</h1>
        <p class="text-muted">{{ isEditMode ? 'Modifica los datos de la sala' : 'Completa los datos para registrar una nueva sala' }}</p>
      </div>

      <!-- Tarjeta del formulario -->
      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
          <!-- Mensaje de error -->
          <div *ngIf="errorMessage" class="alert alert-danger rounded-4" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>
            {{ errorMessage }}
          </div>

          <!-- Cargando -->
          <div *ngIf="loading" class="text-center py-4">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Cargando...</span>
            </div>
            <p class="mt-2 text-muted">Cargando datos...</p>
          </div>

          <!-- Formulario -->
          <form *ngIf="!loading" (ngSubmit)="onSubmit()">
            <!-- Nombre -->
            <div class="mb-3">
              <label class="form-label fw-semibold">
                <i class="bi bi-building me-2"></i>
                Nombre de la Sala *
              </label>
              <input 
                type="text"
                class="form-control"
                [(ngModel)]="sala.nombre"
                name="nombre"
                placeholder="Ej: Sala 1, Sala VIP, Sala 3D"
                required
              >
            </div>

            <!-- Estado -->
            <div class="mb-3">
              <label class="form-label fw-semibold">
                <i class="bi bi-toggle-on me-2"></i>
                Estado *
              </label>
              <select 
                class="form-select"
                [(ngModel)]="sala.estado"
                name="estado"
                required
              >
                <option value="activa">Disponible</option>
                <option value="mantenimiento">No Disponible (Mantenimiento)</option>
              </select>
            </div>

            <!-- Activo -->
            <div class="mb-4">
              <div class="form-check">
                <input 
                  type="checkbox"
                  class="form-check-input"
                  [(ngModel)]="sala.activo"
                  name="activo"
                  id="activo"
                >
                <label class="form-check-label fw-semibold" for="activo">
                  <i class="bi bi-check-circle me-1 text-success"></i>
                  Activo
                </label>
              </div>
              <small class="text-muted">Las salas inactivas no estarán disponibles para asignaciones</small>
            </div>

            <!-- Botones -->
            <div class="d-flex gap-3 mt-3">
              <button type="submit" class="btn btn-primary flex-grow-1 py-2 fw-semibold">
                <i class="bi bi-save me-2"></i>
                {{ isEditMode ? 'Actualizar' : 'Guardar' }}
              </button>
              <button type="button" routerLink="/salas" class="btn btn-outline-secondary px-4">
                <i class="bi bi-x-circle me-2"></i>
                Cancelar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
