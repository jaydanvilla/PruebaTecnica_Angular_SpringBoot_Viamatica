<app-menu></app-menu>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-10">
      <!-- Título -->
      <div class="text-center mb-4">
        <h1 class="h2 fw-bold text-dark">Salas</h1>
        <p class="text-muted">Gestión de salas de cine</p>
      </div>

      <!-- Botón nueva sala -->
      <div class="text-end mb-3">
        <button routerLink="/salas/nueva" class="btn btn-primary rounded-4 px-4 py-2">
          <i class="bi bi-plus-circle me-2"></i>
          Nueva Sala
        </button>
      </div>

      <!-- Mensaje de error -->
      <div *ngIf="errorMessage" class="alert alert-danger rounded-4" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>
        {{ errorMessage }}
      </div>

      <!-- Cargando -->
      <div *ngIf="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Cargando...</span>
        </div>
        <p class="mt-2 text-muted">Cargando salas...</p>
      </div>

      <!-- Tabla de salas -->
      <div *ngIf="!loading && salas.length > 0" class="table-responsive">
        <table class="table table-hover table-bordered rounded-4 overflow-hidden shadow-sm">
          <thead class="table-dark">
            <tr class="text-center">
              <th style="width: 8%">ID</th>
              <th style="width: 35%">Nombre</th>
              <th style="width: 25%">Estado</th>
              <th style="width: 32%">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let sala of salas" class="align-middle">
              <td class="text-center fw-bold">{{ sala.idSala }}</td>
              <td>{{ sala.nombre }}</td>
              <td class="text-center">
                <span *ngIf="sala.estado === 'activa'" class="badge bg-success rounded-pill px-3 py-1">
                  <i class="bi bi-check-circle me-1"></i> Disponible
                </span>
                <span *ngIf="sala.estado !== 'activa'" class="badge bg-secondary rounded-pill px-3 py-1">
                  <i class="bi bi-x-circle me-1"></i> No Disponible
                </span>
              </td>
              <td class="text-center">
                <button [routerLink]="['/salas/editar', sala.idSala]" class="btn btn-warning btn-sm rounded-3 px-3 me-2">
                  <i class="bi bi-pencil me-1"></i>
                  Editar
                </button>
                <button (click)="eliminarSala(sala.idSala)" class="btn btn-danger btn-sm rounded-3 px-3">
                  <i class="bi bi-trash3 me-1"></i>
                  Eliminar
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Sin datos -->
      <div *ngIf="!loading && salas.length === 0" class="text-center py-5">
        <i class="bi bi-inbox fs-1 text-muted"></i>
        <p class="text-muted mt-2">No hay salas registradas</p>
        <button routerLink="/salas/nueva" class="btn btn-primary rounded-4 mt-2">
          <i class="bi bi-plus-circle me-2"></i>
          Crear primera sala
        </button>
      </div>
    </div>
  </div>
</div>
