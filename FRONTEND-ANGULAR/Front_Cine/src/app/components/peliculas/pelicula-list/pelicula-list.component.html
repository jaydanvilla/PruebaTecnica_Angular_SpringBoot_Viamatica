<app-menu></app-menu>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-10">
      <!-- Título -->
      <div class="text-center mb-4">
        <h1 class="h2 fw-bold text-dark">Películas</h1>
        <p class="text-muted">Gestión de películas del cine</p>
      </div>

      <!-- Botón nueva película -->
      <div class="text-end mb-3">
        <button routerLink="/peliculas/nueva" class="btn btn-primary rounded-4 px-4 py-2">
          <i class="bi bi-plus-circle me-2"></i>
          Nueva Película
        </button>
      </div>

      <!-- Mensaje de error -->
      <div *ngIf="errorMessage" class="alert alert-danger rounded-4" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>
        {{ errorMessage }}
      </div>

      <!-- Cargando -->
      <div *ngIf="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Cargando...</span>
        </div>
        <p class="mt-2 text-muted">Cargando películas...</p>
      </div>

      <!-- Tabla de películas -->
      <div *ngIf="!loading && peliculas.length > 0" class="table-responsive">
        <table class="table table-hover table-bordered rounded-4 overflow-hidden shadow-sm">
          <thead class="table-dark">
            <tr class="text-center">
              <th style="width: 8%">ID</th>
              <th style="width: 47%">Nombre</th>
              <th style="width: 20%">Duración</th>
              <th style="width: 25%">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let pelicula of peliculas" class="align-middle">
              <td class="text-center fw-bold">{{ pelicula.idPelicula }}</td>
              <td>{{ pelicula.nombre }}</td>
              <td class="text-center">{{ pelicula.duracion }} minutos</td>
              <td class="text-center">
                <button [routerLink]="['/peliculas/editar', pelicula.idPelicula]" class="btn btn-warning btn-sm rounded-3 px-3 me-2">
                  <i class="bi bi-pencil me-1"></i>
                  Editar
                </button>
                <button (click)="eliminarPelicula(pelicula.idPelicula)" class="btn btn-danger btn-sm rounded-3 px-3">
                  <i class="bi bi-trash3 me-1"></i>
                  Eliminar
                </button>
               </td>
             </tr>
          </tbody>
        </table>
      </div>

      <!-- Sin datos -->
      <div *ngIf="!loading && peliculas.length === 0" class="text-center py-5">
        <i class="bi bi-inbox fs-1 text-muted"></i>
        <p class="text-muted mt-2">No hay películas registradas</p>
        <button routerLink="/peliculas/nueva" class="btn btn-primary rounded-4 mt-2">
          <i class="bi bi-plus-circle me-2"></i>
          Crear primera película
        </button>
      </div>
    </div>
  </div>
</div>
