<app-menu></app-menu>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <!-- Título -->
      <div class="text-center mb-4">
        <h1 class="h2 fw-bold text-dark">{{ isEditMode ? 'Editar Película' : 'Nueva Película' }}</h1>
        <p class="text-muted">{{ isEditMode ? 'Modifica los datos de la película' : 'Completa los datos para registrar una nueva película' }}</p>
      </div>

      <!-- Tarjeta del formulario -->
      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
          <!-- Mensaje de error -->
          <div *ngIf="errorMessage" class="alert alert-danger rounded-4" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>
            {{ errorMessage }}
          </div>

          <!-- Cargando -->
          <div *ngIf="loading" class="text-center py-4">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Cargando...</span>
            </div>
            <p class="mt-2 text-muted">Cargando datos...</p>
          </div>

          <!-- Formulario -->
          <form *ngIf="!loading" (ngSubmit)="onSubmit()">
            <!-- Nombre -->
            <div class="mb-3">
              <label class="form-label fw-semibold">
                <i class="bi bi-film me-2"></i>
                Nombre *
              </label>
              <input 
                type="text"
                class="form-control"
                [(ngModel)]="pelicula.nombre"
                name="nombre"
                placeholder="Ej: Inception, The Matrix"
                required
              >
            </div>

            <!-- Duración -->
            <div class="mb-3">
              <label class="form-label fw-semibold">
                <i class="bi bi-clock me-2"></i>
                Duración (minutos) *
              </label>
              <input 
                type="number"
                class="form-control"
                [(ngModel)]="pelicula.duracion"
                name="duracion"
                placeholder="120"
                min="1"
                required
              >
            </div>

            <!-- Activo -->
            <div class="mb-4">
              <div class="form-check">
                <input 
                  type="checkbox"
                  class="form-check-input"
                  [(ngModel)]="pelicula.activo"
                  name="activo"
                  id="activo"
                >
                <label class="form-check-label fw-semibold" for="activo">
                  <i class="bi bi-check-circle me-1 text-success"></i>
                  Activo
                </label>
              </div>
              <small class="text-muted">Las películas inactivas no se mostrarán en asignaciones</small>
            </div>

            <!-- Botones -->
            <div class="d-flex gap-3 mt-3">
              <button type="submit" class="btn btn-primary flex-grow-1 py-2 fw-semibold">
                <i class="bi bi-save me-2"></i>
                {{ isEditMode ? 'Actualizar' : 'Guardar' }}
              </button>
              <button type="button" routerLink="/peliculas" class="btn btn-outline-secondary px-4">
                <i class="bi bi-x-circle me-2"></i>
                Cancelar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
