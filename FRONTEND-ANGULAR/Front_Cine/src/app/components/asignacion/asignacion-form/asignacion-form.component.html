<app-menu></app-menu>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <!-- Título -->
      <div class="text-center mb-4">
        <h1 class="display-6 fw-bold text-dark">Asignar Película</h1>
        <p class="text-muted">Selecciona una película y una sala para asignar</p>
      </div>

      <!-- Tarjeta del formulario -->
      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
          <!-- Mensaje de error -->
          <div *ngIf="errorMessage" class="alert alert-danger rounded-4" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>
            {{ errorMessage }}
          </div>

          <!-- Cargando -->
          <div *ngIf="loading" class="text-center py-4">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Cargando...</span>
            </div>
            <p class="mt-2 text-muted">Cargando datos...</p>
          </div>

          <!-- Formulario -->
          <form *ngIf="!loading" (ngSubmit)="onSubmit()">
            <!-- Select Película -->
            <div class="mb-4">
              <label class="form-label fw-semibold">
                <i class="bi bi-film me-2"></i>
                Película *
              </label>
              <select 
                (change)="onPeliculaChange($event)"
                class="form-select rounded-3 py-2"
                required
              >
                <option value="">Seleccione una película</option>
                <option *ngFor="let p of peliculas" [value]="p.idPelicula">
                  {{ p.nombre }}
                </option>
              </select>
            </div>

            <!-- Select Sala -->
            <div class="mb-4">
              <label class="form-label fw-semibold">
                <i class="bi bi-building me-2"></i>
                Sala *
              </label>
              <select 
                (change)="onSalaChange($event)"
                class="form-select rounded-3 py-2"
                required
              >
                <option value="">Seleccione una sala</option>
                <option *ngFor="let s of salas" [value]="s.idSala">
                  {{ s.nombre }} - {{ s.estado === 'activa' ? 'Disponible' : 'En mantenimiento' }}
                </option>
              </select>
              <div *ngIf="salas.length === 0" class="form-text text-warning">
                <i class="bi bi-info-circle me-1"></i>
                No hay salas disponibles. Debes crear salas primero.
              </div>
            </div>

            <!-- Fecha Publicación -->
            <div class="mb-4">
              <label class="form-label fw-semibold">
                <i class="bi bi-calendar me-2"></i>
                Fecha Publicación *
              </label>
              <input 
                type="date"
                class="form-control rounded-3 py-2"
                [(ngModel)]="asignacion.fechaPublicacion"
                name="fechaPublicacion"
                required
              >
            </div>

            <!-- Botones -->
            <div class="d-flex gap-3 mt-4">
              <button type="submit" class="btn btn-primary flex-grow-1 rounded-3 py-2 fw-semibold">
                <i class="bi bi-check-circle me-2"></i>
                Asignar
              </button>
              <button type="button" routerLink="/asignaciones" class="btn btn-outline-secondary rounded-3 px-4">
                <i class="bi bi-x-circle me-2"></i>
                Cancelar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
